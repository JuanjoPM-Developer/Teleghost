# TeleGhost Configuration
# Copy this file to config.yaml and fill in your values

telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"  # From @BotFather

mattermost:
  url: "http://127.0.0.1:8065"         # Your MM server URL
  bot_token: "YOUR_MM_BOT_TOKEN"        # Any bot token (for reading responses)
  bot_user_id: "YOUR_MM_BOT_USER_ID"    # User ID of the bot above

users:
  - telegram_id: 123456789              # Your Telegram user ID (from @userinfobot)
    telegram_name: "Your Name"
    mm_user_id: "your_mm_user_id"       # Mattermost user ID
    mm_token: "YOUR_MM_PAT"             # Personal Access Token
    bots:
      - name: "MyBot"
        mm_bot_id: "bot_user_id"        # MM user ID of the bot
        mm_dm_channel: ""               # Leave empty for auto-discovery
        default: true
      - name: "AnotherBot"
        mm_bot_id: "another_bot_user_id"

logging:
  level: "INFO"
  file: "/var/log/teleghost.log"        # Or "" for stdout only

polling:
  telegram_timeout: 30
  mm_poll_interval: 0.5                 # Seconds between MM polls

health:
  port: 9191

# Voice-to-text transcription (optional)
# Transcribes voice messages before posting to Mattermost
# Supports any OpenAI-compatible Whisper API
voice_to_text:
  # enabled: false                      # Omit this section to disable
  url: "http://localhost:9000"          # Whisper API endpoint
  api_key: ""                           # Required for OpenAI/Groq, empty for local
  model: "large-v3"                     # large-v3 (local), whisper-1 (OpenAI), whisper-large-v3-turbo (Groq)
  language: ""                          # ISO 639-1 (es, en) or empty for auto-detect
  keep_audio: true                      # Also send original audio file alongside text
