name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Syntax check
        run: |
          python -m py_compile src/bridgemost/__init__.py
          python -m py_compile src/bridgemost/bridge.py
          python -m py_compile src/bridgemost/config.py
          python -m py_compile src/bridgemost/mattermost.py
          python -m py_compile src/bridgemost/websocket.py
          python -m py_compile src/bridgemost/store.py
          python -m py_compile src/bridgemost/markdown.py
          python -m py_compile src/bridgemost/emoji.py
          python -m py_compile src/bridgemost/health.py
          python -m py_compile src/bridgemost/whisper.py
          echo "All modules compile OK"
